# AI 코딩 생산성 스킬 용어집
#
# 사용법: {{< term "스킬" >}}

- term: 스킬
  abbr: Skill
  definition: "매번 다시 설명할 필요 없이 이름을 부르면 즉시 실행되는, 트리거 조건·절차·주의사항이 문서로 고정된 저장된 워크플로우."
- term: 서브에이전트
  abbr: Subagent
  definition: "메인 대화와 분리된 독립 컨텍스트에서 조사·리서치·병렬 작업을 수행하고, 요약만 메인 대화로 반환하는 실행 단위."
- term: 훅
  abbr: Hook
  definition: "커밋, PR 생성, 배포 완료 같은 특정 이벤트가 발생했을 때 사람의 개입 없이 자동으로 실행되는 스크립트/작업."
- term: MCP
  abbr: Model Context Protocol
  definition: "에이전트가 브라우저, 디자인 툴, 사내 시스템 같은 외부 도구를 표준화된 방식으로 호출할 수 있게 하는 프로토콜."
- term: 한 줄 명령
  abbr: One-liner Command
  definition: "짧은 한 문장의 입력으로 트리거링, 컨텍스트 주입, 결정적 워크플로우 실행까지 이어지는 스킬 호출 방식."
- term: 바이브 코딩
  abbr: Vibe Coding
  definition: "세부 구현을 일일이 지시하지 않고, 원하는 결과와 느낌(vibe)을 설명해 AI 에이전트가 코드를 생성하게 하는 코딩 방식."
- term: 클론 코딩
  abbr: Clone Coding
  definition: "기존 사이트나 애플리케이션의 디자인·구조를 분석해 동일하거나 유사한 결과물을 재현하는 코딩 기법."
- term: 스캐폴딩
  abbr: Scaffolding
  definition: "프로젝트의 디렉터리 구조, 설정 파일, 배포 파이프라인 골격을 표준 템플릿으로 미리 만들어두는 것."
- term: 디자인 토큰
  abbr: Design Token
  definition: "색상, 타이포그래피, 간격 등 디자인 값을 하드코딩하지 않고 재사용 가능한 변수로 정의한 것."
- term: OWASP Top 10
  abbr: OWASP Top 10
  definition: "웹 애플리케이션에서 가장 흔하고 위험한 취약점 10개 범주를 정리한 OWASP의 공식 목록."
- term: SAST
  abbr: Static Application Security Testing
  definition: "소스 코드를 실행하지 않고 정적으로 분석해 취약한 코드 패턴을 탐지하는 보안 테스트 방식."
- term: DAST
  abbr: Dynamic Application Security Testing
  definition: "애플리케이션을 실제로 실행한 상태에서 외부 입력을 주입해 취약점을 탐지하는 보안 테스트 방식."
- term: SCA
  abbr: Software Composition Analysis
  definition: "프로젝트가 사용하는 오픈소스 의존성의 알려진 취약점과 라이선스를 점검하는 분석 방식."
- term: CWE
  abbr: Common Weakness Enumeration
  definition: "소프트웨어 취약점 유형을 분류한 공식 체계로, 정적 분석 도구의 탐지 규칙이 흔히 이 번호로 태깅된다."
- term: SLSA
  abbr: Supply-chain Levels for Software Artifacts
  definition: "빌드·배포 파이프라인의 공급망 무결성을 단계별 수준으로 정의한 프레임워크."
- term: 멀티에이전트
  abbr: Multi-agent
  definition: "서로 독립적인 여러 작업을 여러 에이전트에 분배해 동시에 병렬로 처리하는 실행 방식."
- term: CI/CD
  abbr: Continuous Integration / Continuous Deployment
  definition: "코드 변경을 자동으로 빌드·테스트하고(CI), 검증을 통과한 결과를 자동으로 배포하는(CD) 파이프라인."
- term: 가드레일
  abbr: Guardrail
  definition: "자동화된 에이전트나 스킬이 되돌리기 어려운 작업을 수행하기 전에 반드시 거치도록 설계된 안전장치·승인 단계."
- term: 감사 가능성
  abbr: Auditability
  definition: "어떤 스킬/훅이 언제, 무엇을 실행하고 변경했는지 로그로 추적하고 검증할 수 있는 속성."
