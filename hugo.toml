baseURL = 'https://jeonck.github.io/ai-coding-skills/'
title = 'AI 코딩 생산성 스킬 메뉴'
theme = 'hextra'
locale = 'ko-KR'
defaultContentLanguage = 'ko'
hasCJKLanguage = true

enableGitInfo = true
enableRobotsTXT = true

[markup]
  [markup.highlight]
    noClasses = false
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.extensions.passthrough]
      enable = true
      [markup.goldmark.extensions.passthrough.delimiters]
        block = [['\[', '\]'], ['$$', '$$']]
        inline = [['\(', '\)'], ['$', '$']]

enableInlineShortcodes = true

[[menu.main]]
  name = "학습 콘텐츠"
  identifier = "learn-group"
  weight = 1

[[menu.main]]
  name = "생산성 로드맵"
  pageRef = "/docs"
  parent = "learn-group"
  weight = 1

[[menu.main]]
  name = "실습"
  pageRef = "/labs"
  parent = "learn-group"
  weight = 2

[[menu.main]]
  name = "도구"
  pageRef = "/tools"
  parent = "learn-group"
  weight = 3

[[menu.main]]
  name = "실전 사례"
  pageRef = "/cases"
  weight = 2

[[menu.main]]
  name = "블로그"
  pageRef = "/blog"
  weight = 3

[[menu.main]]
  name = "용어집"
  pageRef = "/glossary"
  weight = 4

[[menu.main]]
  identifier = "github"
  weight = 5
  url = "https://github.com/jeonck/ai-coding-skills"
  [menu.main.params]
    icon = "github"

[[menu.main]]
  name = "검색"
  weight = 6
  [menu.main.params]
    type = "search"

[params]
  description = "한 줄 명령으로 품질과 안정성을 높이는 AI 코딩 기법·스킬 모음 — 지속적으로 축적하고 검색/활용하는 지식베이스"

  [params.navbar]
    displayTitle = true
    displayLogo = false
    width = "wide"

  [params.theme]
    default = "system"
    displayToggle = true

  [params.footer]
    enable = true
    displayCopyright = true
    displayPoweredBy = true

  displayUpdatedDate = true
  dateFormat = "2006년 01월 02일"

  [params.search]
    enable = true
    type = "flexsearch"
    [params.search.flexsearch]
      index = "content"
      tokenize = "forward"

  [params.toc]
    displayTags = true

  [params.highlight]
    [params.highlight.copy]
      enable = true
      display = "hover"

  [params.page]
    width = "wide"
